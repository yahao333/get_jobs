# 配置文件

# 应用配置
app:
  name: "get_jobs"
  version: "1.0.0"
  debug: true
  # 日志级别: debug, info, warn, error
  log_level: "debug"
  # 日志文件路径
  log_file: "./logs/app.log"

# 数据库配置
database:
  type: "sqlite"
  path: "./data/jobs.db"

# Web 服务配置
web:
  host: "0.0.0.0"
  port: 8080

# 搜索配置
search:
  # 城市编码 (Boss直聘)
  city_codes:
    - code: "101010100"
      name: "北京"
    - code: "101020100"
      name: "上海"
    - code: "101280100"
      name: "广州"
    - code: "101280600"
      name: "深圳"
    - code: "101210100"
      name: "杭州"

  # 搜索关键词
  keywords:
    - "Go"
    - "后端开发"
    - "Golang"

  # 职位类型 (Boss直聘: c100=互联网,c200=金融,c300=房地产,c400=教育培训等)
  job_type: "c100"

  # 薪资范围 (k=千, m=万), 如 "15k-30k"
  salary: "15k-30k"

  # 经验要求 (1=1年以下, 3=1-3年, 5=3-5年, 10=5-10年, 99=不限)
  experience: "3"

  # 学历要求 (1=大专, 2=本科, 3=硕士, 4=博士, 99=不限)
  degree: "2"

# AI 配置
ai:
  # 是否启用 AI 生成消息
  enable: true
  # AI 模型类型: qwen_vl (阿里), minimax_vl (Minimax)
  model_type: "qwen_vl"
  # 阿里 Qwen VL API 配置
  qwen:
    api_key: "${QWEN_API_KEY}"
    model: "qwen-vl-plus"
  # Minimax VL API 配置 (备选)
  minimax:
    api_key: "${MINIMAX_API_KEY}"
    model: "Minimax-VL"

# 打招呼配置
greeting:
  # 默认打招呼语
  default: "您好，我对您发布的 {job_name} 职位非常感兴趣，希望能够进一步沟通了解。"

  # 是否启用 AI 生成个性化打招呼语
  enable_ai: true

  # AI 生成模板
  ai_template: |
    请基于以下信息生成简洁友好的中文打招呼语，不超过60字：
    个人介绍：{introduce}
    关键词：{keyword}
    职位名称：{job_name}
    职位描述：{job_description}

# 简历投递配置
delivery:
  # 是否发送图片简历
  send_img_resume: false
  # 图片简历路径
  img_resume_path: "./resources/resume.jpg"
  # 每日投递上限 (Boss直聘约150)
  daily_limit: 100

# 过滤配置
filter:
  # 是否过滤不活跃HR (年前在线)
  filter_dead_hr: true

  # 公司黑名单关键词
  company_blacklist:
    - "保险公司"
    - "平安"
    - "太平洋"
    - "中国人寿"

  # HR黑名单关键词
  hr_blacklist:
    - "招聘专员"
    - "招聘经理"

  # 职位黑名单关键词
  job_blacklist:
    - "实习"
    - "兼职"

# 浏览器配置
browser:
  # 浏览器类型: chrome, edge, firefox
  type: "chrome"
  # 窗口大小
  window_width: 1280
  window_height: 800
  # 是否使用已有浏览器 (false=新建)
  use_existing: false
  # 用户数据目录 (用于保持登录状态)
  user_data_dir: "./data/browser"

# Cookie 配置
cookie:
  # Cookie 存储文件
  file: "./data/cookie.json"

# 黑名单自动更新配置
blacklist:
  # 是否启用黑名单自动更新
  enable: true
  # 匹配关键词
  keywords:
    - "不"
    - "感谢"
    - "但"
    - "遗憾"
    - "抱歉"
    - "不合适"
